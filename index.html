.palco-btn:active{transform:translateY(1px) scale(.99);}
.palco-primary:hover{background:${d.amber};}
.palco-ghost:hover{background:${d.surface2};border-color:${d.border};}
.palco-icon:hover{background:${d.surface2};color:${d.text};}
.palco-song:hover{background:${d.surface2};}
.palco-song:hover .palco-chev{color:${d.amber};transform:translateX(2px);}
.palco-album:hover{border-color:${d.border};background:${d.surface2};}
.palco-album:hover .palco-disc{color:${d.amber};}
.palco-play:hover{background:${d.amber};box-shadow:0 0 28px rgba(240,168,51,.35);}
.palco-chip:hover{background:${d.surface2};border-color:${d.amber};color:${d.text};}
.palco-trash:hover{background:rgba(224,104,60,.16);color:${d.red};border-color:${d.red};}
.palco-chord{cursor:pointer;}
.palco-chord:hover{text-decoration:underline;text-underline-offset:3px;}
.palco-star:hover{color:${d.amber};}
.palco-scroll::-webkit-scrollbar{width:10px;height:10px;}
.palco-scroll::-webkit-scrollbar-track{background:transparent;}
.palco-scroll::-webkit-scrollbar-thumb{background:${d.border};border-radius:99px;border:3px solid ${d.bg};}
.palco-range{-webkit-appearance:none;appearance:none;height:4px;border-radius:99px;background:${d.surface2};outline:none;cursor:pointer;}
.palco-range::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:18px;height:18px;border-radius:50%;background:${d.amber};border:3px solid ${d.bg};box-shadow:0 0 0 1px ${d.amberDeep};cursor:grab;}
.palco-range::-moz-range-thumb{width:14px;height:14px;border-radius:50%;background:${d.amber};border:3px solid ${d.bg};cursor:grab;}
.palco-btn:focus-visible,.palco-range:focus-visible,.palco-song:focus-visible,.palco-album:focus-visible{outline:2px solid ${d.amber};outline-offset:2px;}
.palco-ev{transition:color .12s ease, background .12s ease;border-radius:4px;}
.palco-ev-active{text-decoration:underline;text-underline-offset:4px;}
.palco-ev-hit{background:rgba(123,196,127,.20);}
.palco-ev-miss{background:rgba(224,104,60,.20);}
@media (prefers-reduced-motion: reduce){.palco-btn,.palco-chev,.palco-ev{transition:none!important;}}
