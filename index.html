.palco-root *{box-sizing:border-box;}
.palco-root ::selection{background:${f.amber};color:#1a140a;}
.palco-textarea::placeholder,.palco-input::placeholder{color:${f.textFaint};}
.palco-textarea:focus-visible,.palco-input:focus-visible{outline:none;border-color:${f.amber};box-shadow:0 0 0 3px rgba(240,168,51,.16);}
.palco-btn{transition:transform .12s ease, background .15s ease, border-color .15s ease, color .15s ease;}
.palco-btn:active{transform:translateY(1px) scale(.99);}
.palco-primary:hover{background:${f.amber};}
.palco-ghost:hover{background:${f.surface2};border-color:${f.border};}
.palco-icon:hover{background:${f.surface2};color:${f.text};}
.palco-song:hover{background:${f.surface2};}
.palco-song:hover .palco-chev{color:${f.amber};transform:translateX(2px);}
.palco-album:hover{border-color:${f.border};background:${f.surface2};}
.palco-album:hover .palco-disc{color:${f.amber};}
.palco-play:hover{background:${f.amber};box-shadow:0 0 28px rgba(240,168,51,.35);}
.palco-chip:hover{background:${f.surface2};border-color:${f.amber};color:${f.text};}
.palco-trash:hover{background:rgba(224,104,60,.16);color:${f.red};border-color:${f.red};}
.palco-chord{cursor:pointer;}
.palco-chord:hover{text-decoration:underline;text-underline-offset:3px;}
.palco-star:hover{color:${f.amber};}
.palco-scroll::-webkit-scrollbar{width:10px;height:10px;}
.palco-scroll::-webkit-scrollbar-track{background:transparent;}
.palco-scroll::-webkit-scrollbar-thumb{background:${f.border};border-radius:99px;border:3px solid ${f.bg};}
.palco-range{-webkit-appearance:none;appearance:none;height:4px;border-radius:99px;background:${f.surface2};outline:none;cursor:pointer;}
.palco-range::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:18px;height:18px;border-radius:50%;background:${f.amber};border:3px solid ${f.bg};box-shadow:0 0 0 1px ${f.amberDeep};cursor:grab;}
.palco-range::-moz-range-thumb{width:14px;height:14px;border-radius:50%;background:${f.amber};border:3px solid ${f.bg};cursor:grab;}
.palco-btn:focus-visible,.palco-range:focus-visible,.palco-song:focus-visible,.palco-album:focus-visible{outline:2px solid ${f.amber};outline-offset:2px;}
.palco-ev{transition:color .12s ease, background .12s ease;border-radius:4px;}
.palco-ev-active{text-decoration:underline;text-underline-offset:4px;}
.palco-ev-hit{background:rgba(123,196,127,.20);}
.palco-ev-miss{background:rgba(224,104,60,.20);}
.palco-primary:hover{box-shadow:0 0 22px rgba(240,168,51,.5);}
.palco-chip:hover{box-shadow:0 0 16px rgba(240,168,51,.3);}
.palco-album:hover{box-shadow:0 0 26px rgba(240,168,51,.14);}
.neon{box-shadow:0 0 18px rgba(240,168,51,.5);}
.neon-text{text-shadow:0 0 12px rgba(240,168,51,.55);}
@keyframes neonPulse{0%,100%{box-shadow:0 0 14px rgba(240,168,51,.45);}50%{box-shadow:0 0 26px rgba(240,168,51,.75);}}
.neon-pulse{animation:neonPulse 1.8s ease-in-out infinite;}
@media (prefers-reduced-motion: reduce){.palco-btn,.palco-chev,.palco-ev,.neon-pulse{transition:none!important;animation:none!important;}}
